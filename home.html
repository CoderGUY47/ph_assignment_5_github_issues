<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <title>Issues Tracker - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
  <style type="text/tailwindcss">
    * {
        font-family: "Outfit", sans-serif;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        @apply transition-colors duration-300;
      }

      .no-ring:focus-within {
        outline: none !important;
        border-color: #6366f199 !important; /* subtle purple border on focus */
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15) !important;
      }

      .glass-container {
        @apply bg-slate-900/40 backdrop-blur-md border border-slate-700/40;
      }

      .btn-purple {
        @apply bg-indigo-600 hover:bg-indigo-700 text-white border-none shadow-lg shadow-indigo-600/20 active:scale-95 transition-all;
      }

      /* global reset for white borders/outlines on focus */
      *:focus {
        outline: none !important;
        box-shadow: none !important;
      }

      dialog {
        border: none !important;
        outline: none !important;
      }
      
      .modal-box {
        outline: none !important;
        border: 2px solid rgba(51, 65, 85, 0.5) !important; /* slate-700/50 */
      }
    </style>
</head>

<body class="bg-slate-950 text-slate-100 selection:bg-indigo-500/30">
  <nav class="navbar bg-slate-900/40 backdrop-blur-xl border-b border-slate-800/60 px-4 md:px-10 sticky top-0 z-50 shadow-2xl">
    <div class="flex-1">
      <a class="btn btn-ghost text-lg md:text-2xl gap-2 normal-case p-0 sm:p-2 hover:bg-white/5 active:scale-95">
        <i class="fa-brands fa-github text-white text-3xl"></i>
        <span class="font-black tracking-tight hidden sm:block text-slate-50">ISSUES TRACKER</span>
        <span class="font-black tracking-tight block sm:hidden text-slate-50">ISSUES</span>
      </a>
    </div>

    <div class="flex items-center gap-2">
      <label
        class="input input-bordered no-ring flex items-center gap-2 w-32 sm:w-48 md:w-auto bg-slate-800/40 border-slate-700/50 transition-all h-10 md:h-12 focus-within:bg-slate-800/60">
        <i class="fa-solid fa-magnifying-glass text-slate-500"></i>
        <input id="search-input" type="text" class="grow font-medium focus:outline-none text-sm text-slate-100 placeholder:text-slate-500" placeholder="Search issues..." />
      </label>
      <button class="btn h-10 md:h-12 btn-purple px-4 md:px-6">
        <i class="fa-solid fa-plus"></i><span class="hidden md:inline ml-1">New Issues</span>
      </button>
      <button id="logout-btn" class="btn h-10 md:h-12 bg-rose-500/10 hover:bg-rose-500 text-rose-500 hover:text-white border border-rose-500/20 hover:border-rose-500 transition-all px-3">
        <i class="fa-solid fa-right-from-bracket"></i><span class="hidden md:inline ml-1">Logout</span>
      </button>
    </div>
  </nav>

  <!-- Switchtab Panel -->
  <section class="switch-tab-bar w-full md:w-11/12 lg:w-11/12 mx-auto mt-8 px-4 sm:px-0">
    <div id="tab-container" class="flex flex-wrap gap-2 md:gap-4 p-1.5 bg-slate-700/50 rounded-2xl border border-slate-800/60 w-fit mx-auto lg:mx-0">
      <button onclick="switchTab('all')" id="all-tab"
        class="btn-tab px-6 h-10 rounded-xl text-sm font-bold transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-600/20">
        All Issues
      </button>
      <button onclick="switchTab('open')" id="open-tab"
        class="btn-tab px-6 h-10 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white hover:bg-slate-800">
        Open
      </button>
      <button onclick="switchTab('closed')" id="closed-tab"
        class="btn-tab px-6 h-10 rounded-xl text-sm font-bold transition-all text-slate-400 hover:text-white hover:bg-slate-800">
        Closed
      </button>
    </div>
  </section>

  <section class="w-full md:w-11/12 lg:w-11/12 mx-auto mt-6 px-4 sm:px-0">
    <div class="flex flex-col sm:flex-row justify-between items-center glass-container py-5 px-8 rounded-3xl gap-2 shadow-2xl">
      <div class="flex gap-x-5 items-center">
        <div class="bg-white w-14 h-14 flex justify-center items-center rounded-2xl border border-indigo-400/70">
          <i class="fa-solid fa-qrcode text-indigo-500 text-3xl"></i>
        </div>
        <div>
          <p id="issues-counter" class="text-4xl font-black text-white tracking-tight">0</p>
          <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Total Issues Found</p>
        </div>
      </div>
      <div class="flex gap-8 bg-indigo-500/10 p-4 px-8 rounded-xl border-2 backdrop-blur-md border-indigo-100/10 shadow-inner">
        <div class="flex items-center gap-2.5">
          <i class="fa-solid fa-circle text-green-500 text-[10px] animate-pulse"></i>
          <p class="text-[11px] font-black uppercase text-slate-300 tracking-wider">Open</p>
        </div>
        <div class="flex items-center gap-2.5">
          <i class="fa-solid fa-circle text-indigo-400 text-[10px] animate-pulse"></i>
          <p class="text-[11px] font-black uppercase text-slate-300 tracking-wider">Closed</p>
        </div>
      </div>
    </div>
  </section>

  <section class="w-full md:w-11/12 lg:w-11/12 mx-auto mt-10 mb-20 px-4 sm:px-0">
    <!-- Loading Spinner -->
    <div id="spinner" class="flex justify-center py-24">
       <span class="loading loading-bars loading-lg text-indigo-400/95"></span>
    </div>

    <div id="issue-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 space-y-4">
      <!-- Cards will be populated here -->
    </div>
  </section>

  <!-- Template for Issue Cards -->
  <template id="issue-card-template">
    <div class="issue-card cursor-pointer group glass-container rounded-[2rem] p-5 flex flex-col justify-between h-[350px] 
    w-full hover:bg-slate-700/60 transition-all duration-300 shadow-xl hover:shadow-indigo-400/20 active:scale-95 relative overflow-hidden">
      <!-- Dynamic top border bar -->
      <div class="card-border-top h-2 w-full absolute top-0 left-0 transition-colors duration-300"></div>
      <div class="flex justify-between items-start mb-0 mt-4">
        <div class="status-icon-container flex items-center justify-center w-8 h-8 rounded-xl bg-slate-950/50 border border-slate-700/50 shadow-inner">
           <i class="status-icon fa-solid text-lg transition-transform group-hover:scale-110"></i>
        </div>
        <div class="priority-container flex"></div>
      </div>
      
      <div class="mb-3 -mt-4">
        <h3 class="issue-title text-xl font-bold text-slate-50 mb-2 group-hover:text-indigo-400 transition-colors line-clamp-1"></h3>
        <p class="issue-desc text-sm font-medium text-slate-400 leading-relaxed line-clamp-2"></p>
      </div>
      
      <div class="-mt-4 pt-0">
        <hr class="mt-0 pt-7 border-t-2 border-slate-500/60">
        <div class="labels-container flex flex-wrap gap-2.5 mb-5"></div>
        <div class="flex justify-between items-center text-[11px] font-black uppercase tracking-widest text-slate-500">
          <p class="issue-meta opacity-80 flex items-center gap-1.5"><i class="fa-regular fa-circle-user text-slate-600"></i> <span></span></p>
          <p class="issue-date opacity-60"></p>
        </div>
      </div>
    </div>
  </template>

  <!-- Modal for Issue Details -->
  <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle backdrop-blur-xl outline-none">
    <div class="modal-box !bg-slate-900 border-2 border-slate-700/50 shadow-2xl p-0 overflow-hidden w-[850px] max-w-[95vw] rounded-[2.5rem] outline-none">
      <!-- Modal Header -->
      <div class="bg-indigo-600/5 p-6 md:p-7 border-b border-slate-800/80 flex justify-between items-start backdrop-blur-md">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <span id="modal-issue-id" class="text-indigo-400 font-mono text-xs tracking-widest bg-indigo-500/15 px-3 py-1 rounded-lg border border-indigo-500/20 shadow-inner">#000</span>
            <div id="modal-status-badge"></div>
          </div>
          <h3 id="modal-title" class="font-black text-3xl text-slate-50 tracking-tight leading-tight">Issue Details</h3>
        </div>
        <form method="dialog">
          <button class="btn btn-sm btn-circle btn-ghost text-slate-600 hover:bg-slate-100/5 hover:text-white transition-all">✕</button>
        </form>
      </div>
      
      <div class="p-6 md:p-8 space-y-5">
        <!--stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 py-4 border-y border-slate-800/40">
          <div class="space-y-1">
            <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.15em]">Reporter</p>
            <p id="modal-author" class="text-sm font-bold text-slate-200 truncate">---</p>
          </div>
          <div class="space-y-1">
            <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.15em]">Assignee</p>
            <p id="modal-assignee" class="text-sm font-bold text-slate-200 truncate">---</p>
          </div>
          <div class="space-y-1">
            <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.15em]">Created</p>
            <p id="modal-date" class="text-sm font-bold text-slate-400">---</p>
          </div>
          <div class="space-y-1">
            <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.15em]">Last Activity</p>
            <p id="modal-updated" class="text-sm font-bold text-slate-400">---</p>
          </div>
        </div>

        <!-- Description -->
        <div class="space-y-2">
          <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.2em] px-1">Overview</p>
          <div class="bg-slate-950/40 rounded-3xl p-6 border border-slate-800/80 shadow-inner">
            <p id="modal-description" class="text-slate-300 text-[16px] leading-relaxed whitespace-pre-line font-medium"></p>
          </div>
        </div>

        <!-- Tags Grid -->
        <div class="flex flex-col sm:flex-row gap-8 px-1">
          <div class="flex-1 space-y-2">
             <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.2em]">Priority</p>
             <div id="modal-priority" class="flex"></div>
          </div>
          <div class="flex-1 space-y-2">
            <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.2em]">Labels</p>
            <div id="modal-labels" class="flex flex-wrap gap-3"></div>
          </div>
        </div>
      </div>

      <!-- Footer Action -->
      <div class="modal-action p-6 md:p-8 bg-slate-950/40 border-t border-slate-800/80 m-0">
        <form method="dialog" class="w-full sm:w-auto ml-auto">
          <button class="btn btn-purple px-12 h-14 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-transform">
            Close Details
          </button>
        </form>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop bg-slate-950/60 backdrop-blur-md">
      <button>close</button>
    </form>
  </dialog>

  <script src="./script/machine.js"></script>
  <script src="./script/index.js"></script>
</body>
</html>
