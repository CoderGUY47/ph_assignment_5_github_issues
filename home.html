<!doctype html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <title>Issues Tracker - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
  <style type="text/tailwindcss">
    * {
        font-family: "Outfit", sans-serif;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .no-ring:focus-within {
        outline: none !important;
        border-color: #d1d5db !important; /* keeps border gray instead of turning blue/purple */
        box-shadow: none !important;
      }
    </style>
</head>

<body class="bg-white text-gray-900">
  <nav class="navbar bg-white border-b border-slate-200 px-4 md:px-8 sticky top-0 z-50 shadow-sm">
    <div class="flex-1">
      <a class="btn btn-ghost text-lg md:text-xl gap-2 normal-case p-0 sm:p-2">
        <i class="fa-brands fa-github text-2xl md:text-3xl"></i>
        <span class="font-bold tracking-tight hidden sm:block">GitHub Issues Tracker</span>
        <span class="font-bold tracking-tight block sm:hidden">Issues</span>
      </a>
    </div>

    <div class="flex items-center gap-2">
      <label
        class="input input-bordered no-ring flex items-center gap-2 w-32 sm:w-48 md:w-auto bg-gray-50 border-gray-300 transition-all h-10 md:h-12">
        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        <input id="search-input" type="text" class="grow font-medium focus:outline-none text-sm" placeholder="Search" />
      </label>
      <button class="btn h-10 md:h-12 btn-primary border-none text-xs md:text-sm">
        <i class="fa-solid fa-plus"></i><span class="hidden md:inline ml-1">New Issues</span>
      </button>
      <button id="logout-btn" class="btn w-28 h-10 md:w-32 md:h-12 bg-red-500/90 border-none text-white hover:bg-red-600 transition-all p-2 text-xs md:text-sm">
        <i class="fa-solid fa-right-from-bracket"></i><span class="hidden md:inline ml-1">Logout</span>
      </button>
    </div>
  </nav>

  <!-- switchtab panel -->
  <section class="switch-tab-bar w-[95%] md:w-11/12 lg:w-9/12 mx-auto mt-6 pb-6 md:pb-10">
    <div class="mx-auto border-0 mt-6">
      <div class="flex gap-3 py-3" id="tab-container">
        <button onclick="switchTab('all')" id="all-tab"
          class="btn btn-tab w-24 py-2 rounded-lg text-sm font-medium transition-all border-transparent text-white btn-primary">
          All
        </button>
        <button onclick="switchTab('open')" id="open-tab"
          class="btn btn-tab w-24 py-2 rounded-lg text-sm font-medium transition-all bg-white text-gray-700 border border-gray-300">
          Open
        </button>
        <button onclick="switchTab('closed')" id="closed-tab"
          class="btn btn-tab w-24 py-2 rounded-lg text-sm font-medium transition-all bg-white text-gray-700 border border-gray-300">
          Closed
        </button>
      </div>
    </div>
  </section>

  <section class="w-[95%] md:w-11/12 lg:w-9/12 mx-auto mb-4 -mt-4">
    <div class="flex flex-col sm:flex-row justify-between items-center bg-black/5 sm:bg-black/10 py-4 sm:py-3 rounded-xl border-2 border-gray-300 p-4 gap-4">
      <div class="flex gap-x-4 items-center justify-center">
        <div class="bg-indigo-200/60 w-12 h-12 flex p-3 rounded-full">
          <img src="./assets/Aperture.png" alt="" />
        </div>
        <div>
          <h3 id="issues-counter" class="font-semibold text-gray-900 text-lg uppercase">
            50 issues
          </h3>
          <p class="font-normal text-gray-400 text-sm">
            Track and manage your project issues
          </p>
        </div>
      </div>
      <div class="flex gap-7 justify-start">
        <circle class="flex items-center justify-center gap-x-1">
          <i class="fa-solid fa-circle text-[#00A96E]"></i>
          <p class="text-sm font-semibold uppercase">Open</p>
        </circle>
        <circle class="flex items-center justify-center gap-x-1">
          <i class="fa-solid fa-circle text-indigo-600"></i>
          <p class="font-semibold text-sm uppercase">Closed</p>
        </circle>
      </div>
    </div>
  </section>

  <section class="w-[95%] md:w-11/12 lg:w-9/12 mx-auto mt-6 mb-12">
    <!-- loading spinner -->
    <div id="spinner" class="flex justify-center py-10">
       <span class="loading loading-bars loading-xl"></span>
    </div>

    <div id="issue-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 place-items-center">
      <!-- cards will be showing here -->
    </div>
  </section>
  <!-- template used for hidden mainly, it like hidden, but temolate used for DOM specially-->
  <template id="issue-card-template">
    <div class="issue-card cursor-pointer g transition-transform space-y-2 border-t-[5px] rounded-lg flex flex-col justify-between w-[275px] h-[279px] p-4 shadow-black/25 shadow-lg bg-slate-200/30 border border-gray-100">
      <div class="flex justify-between items-center">
        <img class="status-img w-auto h-6 object-contain" src="" alt="status" />
        <div class="priority-container"></div>
      </div>
      <h3 class="issue-title text-base font-bold text-gray-900 leading-tight"></h3>
      <p class="issue-desc text-[13px] font-normal text-gray-500 leading-relaxed line-clamp-3"></p>
      <div class="flex flex-wrap gap-2 mt-1">
        <div class="labels-container flex flex-wrap gap-2 w-full"></div>
      </div>
      <span class="h-[1px] rounded-full w-full bg-gray-300/80"></span>
      <div class="mt-auto space-y-1 pt-1 flex justify-between">
        <p class="issue-meta text-gray-400 text-[11px] font-medium"></p>
        <p class="issue-date text-gray-400 text-[11px] font-medium"></p>
      </div>
    </div>
  </template>

  <!-- pop up design manually first then, redessign withthe help of ai-->
  <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box w-11/12 max-w-2xl bg-white rounded-2xl shadow-2xl p-0 overflow-hidden border border-gray-100">
      
      <!-- modal header -->
      <div id="modal-header" class="px-8 py-5 flex justify-between items-center border-b bg-gray-50/50 backdrop-blur-sm border-gray-100 relative">
        <div class="flex items-center gap-4">
          <span id="modal-issue-id" class="px-2.5 py-1 bg-gray-200/60 rounded text-xs font-bold text-gray-500 tracking-wider">#--</span>
          <div id="modal-status-badge"></div>
        </div>
        <form method="dialog">
          <button class="btn btn-sm btn-circle btn-ghost text-gray-400 hover:text-gray-900 hover:bg-gray-100 transition-colors">✕</button>
        </form>
      </div>

      <!-- modal content -->
      <div id="modal" class="px-8 py-6 space-y-8">
        
        <!-- title and basic info -->
        <div class="space-y-4">
          <h2 id="modal-title" class="text-3xl font-extrabold text-gray-900 leading-tight tracking-tight">Loading...</h2>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-gray-50/80 p-4 rounded-xl border border-gray-100/50">
            <div class="space-y-2">
              <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Reporter & Date</p>
              <div class="flex flex-col gap-1 text-sm text-gray-600 font-medium">
                <span class="flex items-center gap-2"><i class="fa-regular fa-user text-indigo-500"></i> <span id="modal-author">--</span></span>
                <span class="flex items-center gap-2"><i class="fa-regular fa-calendar text-indigo-500"></i> <span id="modal-date">--</span></span>
              </div>
            </div>
            <div class="space-y-2">
              <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Assignee & History</p>
              <div class="flex flex-col gap-1 text-sm text-gray-600 font-medium">
                <span class="flex items-center gap-2"><i class="fa-solid fa-user-check text-green-500"></i> <span id="modal-assignee">--</span></span>
                <span class="flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left text-green-500"></i> <span id="modal-updated">--</span></span>
              </div>
            </div>
          </div>
        </div>

        <!-- description section -->
        <div class="space-y-3">
          <div class="flex items-center gap-2 px-1">
            <i class="fa-solid fa-align-left text-gray-400 text-xs"></i>
            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Description</h4>
          </div>
          <div class="bg-white border border-gray-100 shadow-sm rounded-xl p-5">
            <p id="modal-description" class="text-gray-600 text-[15px] leading-relaxed font-normal">...</p>
          </div>
        </div>

        <!-- priority and labels grid -->
        <div class="grid grid-cols-2 gap-8 px-1">
          <div class="space-y-3">
            <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Issue Priority</h4>
            <div id="modal-priority"></div>
          </div>
          <div class="space-y-3">
            <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Category Tags</h4>
            <div id="modal-labels" class="flex flex-wrap gap-2"></div>
          </div>
        </div>
      </div>

      <!-- modal footer action -->
      <div class="modal-action p-6 bg-gray-50/50 border-t border-gray-100 mt-0">
        <form method="dialog" class="w-full">
          <button class="btn btn-primary w-full sm:w-auto sm:px-12 rounded-xl font-bold shadow-lg shadow-indigo-100 transition-all hover:-translate-y-0.5 active:translate-y-0">
            Close Details
          </button>
        </form>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop backdrop-blur-[2px]">
      <button>close</button>
    </form>
  </dialog>

  <script src="./script/machine.js"></script>
  <script src="./script/index.js"></script>
</body>
</html>
